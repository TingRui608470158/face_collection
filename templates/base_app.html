<!doctype html>
<html lang="zh-Hant">
  <head>
    {% load static %}
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}SYNCROBOTIC{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'assets/app.css' %}?v=6" />
    {% block head_extra %}{% endblock %}
  </head>
  <body>
    <nav class="navbar navbar-expand-md bg-white border-bottom">
      <div class="container-fluid px-3">
        <a class="navbar-brand d-flex align-items-center gap-2" href="{% url 'console_employees' %}">
          <img src="{% static 'assets/logo.png' %}?v={{ STATIC_VERSION }}" alt="SYNCROBOTIC" />
          <span class="fw-semibold">SYNCROBOTIC Console</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topnav" aria-controls="topnav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="topnav">
          <ul class="navbar-nav me-auto mb-2 mb-md-0">
            <li class="nav-item"><a class="nav-link {% if active_tab == 'collect' %}active{% endif %}" href="{% url 'name_role_form' %}">人臉收集</a></li>
            <li class="nav-item"><a class="nav-link {% if active_tab == 'employees' %}active{% endif %}" href="{% url 'console_employees' %}">員工管理</a></li>
            <li class="nav-item"><a class="nav-link {% if active_tab == 'visitors' %}active{% endif %}" href="{% url 'console_visitors' %}">訪客管理</a></li>
          </ul>
          <form class="d-flex" action="{% url 'logout' %}" method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-secondary">登出</button>
          </form>
        </div>
      </div>
    </nav>
    <main class="container-fluid py-3">
      {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    {% block body_extra %}{% endblock %}
  </body>
  </html>
