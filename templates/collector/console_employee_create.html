{% extends 'base_app.html' %}
{% block title %}新增員工{% endblock %}
{% block content %}
  {% with active_tab='employees' %}{% endwith %}
  <div class="card"><div class="card-body" style="max-width:640px;">
    <h2 class="h5">新增員工（本地）</h2>
    {% if error %}<div class="alert alert-warning">{{ error }}</div>{% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">姓名</label>
        <input name="name" type="text" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">員工編號</label>
        <input name="employee_id" type="text" class="form-control" required>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-primary" type="submit">建立</button>
        <a class="btn btn-secondary" href="{% url 'console_employees' %}">返回</a>
      </div>
    </form>
  </div></div>
{% endblock %}
